apiVersion: apps/v1
kind: Deployment

metadata:
  name: django-app
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: django-app

  template:
    metadata:
      labels:
        app: django-app

    spec:
      containers:
      - name: django-app

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: {{ .Values.containerPort }}

        resources:
          {{- toYaml .Values.resources | nindent 10 }}

        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.containerPort }}
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.containerPort }}
          initialDelaySeconds: 30
          periodSeconds: 20

        securityContext:
          runAsUser: 33
          runAsGroup: 33
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "core.settings"

        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: host

        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: database

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: username

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: password

        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: port
