apiVersion: batch/v1
kind: Job

metadata:
  name: django-app-migrate
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"

spec:
  backoffLimit: 3

  template:
    spec:
      restartPolicy: Never

      containers:
      - name: migrate

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        command:
        - python
        - manage.py
        - migrate

        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "core.settings"

        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: host

        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: database

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: username

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: password

        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: django-postgresql
              key: port
