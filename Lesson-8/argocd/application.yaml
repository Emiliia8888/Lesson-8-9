apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: django-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Emiliia8888/Lesson-8-9.git
    targetRevision: main
    path: charts/django-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
