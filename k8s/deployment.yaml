apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  namespace: default
  labels:
    app: django-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      containers:
      - name: django
        # URL вашого ECR + тег образу (Jenkins буде міняти цей тег автоматично)
        image: 034255117140.dkr.ecr.eu-central-1.amazonaws.com/django-app-gitops:latest
        ports:
        - containerPort: 8000
        env:
        - name: DEBUG
          value: "0"
